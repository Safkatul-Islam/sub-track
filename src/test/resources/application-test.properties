# Dedicated in-memory H2 so tests never share state with the dev DB
spring.datasource.url=jdbc:h2:mem:sub_db_test;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Don't run the dev-only data.sql seed during tests — @BeforeEach owns the state
spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=false

# Disable the H2 console in tests
spring.h2.console.enabled=false

# Quieter logs
logging.level.org.hibernate.SQL=WARN
logging.level.org.springframework.web=WARN